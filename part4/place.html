<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB — Place Details</title>
    <link rel="icon" href="images/icon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="header-inner">
            <a href="index.html" class="header-logo-link">
                <img src="images/logo.png" alt="HBnB Logo" class="logo">
            </a>
            <a href="login.html" id="login-link" class="login-button">Login</a>
        </div>
    </header>

    <!-- MAIN -->
    <main>
        <!-- Place Details (populated by JS) -->
        <section id="place-details" class="place-details">
            <p>Loading place details...</p>
        </section>

        <!-- Reviews (populated by JS) -->
        <section id="reviews"></section>

        <!-- Add Review Section (visible only when logged in) -->
        <section id="add-review" class="add-review" style="display:none">
            <h2>Add a Review</h2>
            <form id="review-form" class="form">
                <label for="review-text">Your Review:</label>
                <textarea id="review-text" name="review-text" rows="4" required></textarea>

                <label for="rating">Rating:</label>
                <select id="rating" name="rating" required>
                    <option value="1">1 Star</option>
                    <option value="2">2 Stars</option>
                    <option value="3">3 Stars</option>
                    <option value="4">4 Stars</option>
                    <option value="5">5 Stars</option>
                </select>

                <button type="submit" class="btn-primary">Submit Review</button>
            </form>
        </section>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2024 HBnB Evolution. All rights reserved.</p>
    </footer>

    <div id="toast" class="toast"></div>
    <script src="scripts.js"></script>
</body>
</html>
