<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Login</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <a href="index.html">
            <img src="images/logo.png" alt="HBnB Logo" class="logo">
        </a>
        <nav>
            <a href="login.html" class="login-button" id="login-link">Login</a>
        </nav>
    </header>

    <main>
        <!-- WRAPPER centré pour le formulaire de login-->
        <div class="login-wrapper">
            <!-- FORMULAIRE DE LOGIN
            id="login-form" -> intercepté par scripts.js
            -->
            <form id="login-form">
                <h2>Welcome back</h2>
                <p class="form-subtitle">Log in to your HBnB account</p>

                <!-- Message d'erreur caché par défaut, affiché par JS si login échoue -->
                <div class="error-message" id="login-error">
                    Invalid email or password. Please try again.
                </div>

                <div class="form-group">
                    <!--
                    for="email" doit correspondre à id="email" sur l'input
                    type="email" -> validation HTML5 native-->
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email"
                    required placeholder="your@email.com"
                    autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password"
                    required placeholder="••••••••"
                    autocomplete="current-password">
                </div>

                <button type="submit" class="btn-primary">Sign In</button>
            </form>
        </div>
    </main>

    <footer>
        <p>© 2026 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
