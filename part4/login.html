<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB — Login</title>
    <link rel="icon" href="images/icon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="header-inner">
            <a href="index.html" class="header-logo-link">
                <img src="images/logo.png" alt="HBnB Logo" class="logo">
            </a>
            <a href="login.html" id="login-link" class="login-button">Login</a>
        </div>
    </header>

    <!-- LOGIN FORM -->
    <main class="login-wrapper">
        <form id="login-form">
            <h2>Login</h2>

            <div id="login-error" class="error-message" style="display:none">
                Invalid email or password. Please try again.
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Your password" required>
            </div>

            <button type="submit" class="btn-primary">Login</button>

            <div class="login-demo-hint">
                Demo: <code>admin@hbnb.io</code> / <code>admin1234</code>
            </div>
        </form>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2024 HBnB Evolution. All rights reserved.</p>
    </footer>

    <div id="toast" class="toast"></div>
    <script src="scripts.js"></script>
</body>
</html>
