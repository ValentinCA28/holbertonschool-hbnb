<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB — Add a Place</title>
    <link rel="icon" href="images/icon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="header-inner">
            <a href="index.html" class="header-logo-link">
                <img src="images/logo.png" alt="HBnB Logo" class="logo">
            </a>
            <a href="login.html" id="login-link" class="login-button">Login</a>
        </div>
    </header>

    <!-- MAIN -->
    <main>
        <div class="add-place-wrapper">
            <div class="add-place-header">
                <h1>Add a New Place</h1>
                <p class="add-place-subtitle">Share your space with the world</p>
            </div>

            <form id="add-place-form">
                <!-- Basic Info -->
                <fieldset class="form-section">
                    <legend>Basic Information</legend>
                    <div class="form-group">
                        <label for="place-title">Title <span class="required-star">*</span></label>
                        <input type="text" id="place-title" name="title" placeholder="e.g. Sunny Beach House" maxlength="100" required>
                        <span class="field-hint">Max 100 characters</span>
                    </div>
                    <div class="form-group">
                        <label for="place-description">Description</label>
                        <textarea id="place-description" name="description" rows="4" placeholder="Describe your place..."></textarea>
                    </div>
                </fieldset>

                <!-- Pricing -->
                <fieldset class="form-section">
                    <legend>Pricing</legend>
                    <div class="form-group">
                        <label for="place-price">Price per Night <span class="required-star">*</span></label>
                        <div class="input-with-prefix">
                            <span class="input-prefix">$</span>
                            <input type="number" id="place-price" name="price" placeholder="0.00" min="1" step="0.01" required>
                        </div>
                    </div>
                </fieldset>

                <!-- Location -->
                <fieldset class="form-section">
                    <legend>Location</legend>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="place-latitude">Latitude <span class="required-star">*</span></label>
                            <input type="number" id="place-latitude" name="latitude" placeholder="e.g. 48.8566" min="-90" max="90" step="any" required>
                        </div>
                        <div class="form-group">
                            <label for="place-longitude">Longitude <span class="required-star">*</span></label>
                            <input type="number" id="place-longitude" name="longitude" placeholder="e.g. 2.3522" min="-180" max="180" step="any" required>
                        </div>
                    </div>
                </fieldset>

                <!-- Amenities -->
                <fieldset class="form-section">
                    <legend>Amenities</legend>
                    <div id="amenities-list" class="amenities-checkboxes">
                        <span class="loading-amenities">Loading amenities...</span>
                    </div>
                </fieldset>

                <!-- Actions -->
                <div class="form-actions">
                    <a href="index.html" class="btn-cancel">Cancel</a>
                    <button type="submit" class="btn-primary btn-submit-place">Publish My Place</button>
                </div>
            </form>
        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2024 HBnB Evolution. All rights reserved.</p>
    </footer>

    <div id="toast" class="toast"></div>
    <script src="scripts.js"></script>
</body>
</html>
