<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB — Available Places</title>
    <link rel="icon" href="images/icon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="header-inner">
            <a href="index.html" class="header-logo-link">
                <img src="images/logo.png" alt="HBnB Logo" class="logo">
            </a>
            <a href="login.html" id="login-link" class="login-button">Login</a>
        </div>
    </header>

    <!-- MAIN -->
    <main>
        <h1 class="section-title">Available Places</h1>

        <div class="filters-bar">
            <span class="filter-label">Max Price:</span>
            <select id="price-filter"></select>
        </div>

        <section id="places-list">
            <p class="loading-msg">Loading places...</p>
        </section>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2024 HBnB Evolution. All rights reserved.</p>
    </footer>

    <div id="toast" class="toast"></div>
    <script src="scripts.js"></script>
</body>
</html>
